name: Deploy frontend

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. Скачиваем код репозитория на виртуальную машину GitHub Actions
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Настраиваем Docker Buildx (движок, который поддерживает кэширование)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Собираем образ с использованием кэша и сразу сохраняем в tar-архив
      - name: Build and export Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.prod
          tags: future-frontend:latest
          # Эта настройка сразу сохраняет результат в файл, заменяя шаг `docker save`
          outputs: type=docker,dest=frontend-image.tar
          # Если Next.js нужны переменные окружения на этапе билда, раскомментируй блок ниже:
          # build-args: |
          #   NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 4. Перекидываем архив на твой сервер
      - name: Copy Image to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "frontend-image.tar"
          target: "future-school/future-school-frontend/" # Путь относительно домашней папки

      # 5. Распаковываем архив на сервере и резко перезапускаем
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true
          script: |
            set -euo pipefail
            cd ~/future-school/future-school-frontend
            
            # СНАЧАЛА полностью гасим старые контейнеры и чистим сирот
            docker compose -f docker-compose.prod.yml down --remove-orphans
            
            # Загружаем новый образ из архива
            docker load -i frontend-image.tar
            
            # Поднимаем заново (он сам создаст новую чистую сеть)
            docker compose -f docker-compose.prod.yml up --no-build -d
            
            # Убираем за собой мусор
            rm frontend-image.tar
            docker system prune -f || true